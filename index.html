<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloxybob Games</title>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* ===== STARFIELD ===== */
#starfield {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* ===== TOP BAR ===== */
.top-bar {
    background: rgba(0, 0, 0, 0.7);
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid #222;
    backdrop-filter: blur(6px);
}

/* ===== HERO ===== */
.hero {
    text-align: center;
    padding: 60px 20px;
}

/* ===== GAME GRID (FIXED) ===== */
.games {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 40px;
    flex-wrap: wrap;
    transition: all 0.4s ease;
}

.game-card {
    width: 300px; /* Fixed width prevents stretching */
    background: rgba(20, 20, 20, 0.8);
    padding: 30px;
    border-radius: 12px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: transform 0.3s ease, opacity 0.6s ease;
}

.game-card:hover {
    transform: scale(1.05);
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    border: none;
    border-radius: 6px;
    background: #00aaff;
    color: white;
    cursor: pointer;
    font-size: 16px;
}

button:hover {
    background: #0088cc;
}

/* Fade-in animation */
.fade-in {
    opacity: 0;
    animation: fadeIn 0.8s forwards ease;
}

@keyframes fadeIn {
    to { opacity: 1; }
}
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<header class="top-bar">
    <h1>Bloxybob Games</h1>
</header>

<section class="hero">
    <h2>Game Projects</h2>
</section>

<section class="games" id="gameGrid">
    <div class="game-card">
        <h3>Block 3D</h3>
        <p>A 3D block sandbox game.</p>
        <button onclick="goToGame('block3d.html')">View Game</button>
    </div>
</section>

<script>
/* ===== STARFIELD SCRIPT ===== */

const canvas = document.getElementById("starfield");
const ctx = canvas.getContext("2d");

let stars = [];
const STAR_COUNT = 200;

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

class Star {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2;
        this.speed = Math.random() * 0.6 + 0.2;
    }
    update() {
        this.y += this.speed;
        if (this.y > canvas.height) {
            this.reset();
            this.y = 0;
        }
    }
    draw() {
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initStars() {
    stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
        stars.push(new Star());
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(star => {
        star.update();
        star.draw();
    });
    requestAnimationFrame(animate);
}

initStars();
animate();

/* ===== NAVIGATION ===== */
function goToGame(page) {
    window.location.href = page;
}

/* ===== SECRET KEY SEQUENCE ===== */

const secretCode = ["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Enter"];
let userInput = [];

document.addEventListener("keydown", (e) => {
    userInput.push(e.key);
    if (userInput.length > secretCode.length) userInput.shift();

    if (JSON.stringify(userInput) === JSON.stringify(secretCode)) {
        revealSecretCard();
    }
});

function revealSecretCard() {
    if (document.getElementById("estropolis-card")) return;

    const grid = document.getElementById("gameGrid");

    const card = document.createElement("div");
    card.className = "game-card fade-in";
    card.id = "estropolis-card";

    card.innerHTML = `
        <h3>Estropolis</h3>
        <p>A Muiltplayer Historical combat project.</p>
        <button onclick="goToGame('estropolis.html')">View Project</button>
    `;

    grid.appendChild(card);
}
</script>

</body>
</html>
